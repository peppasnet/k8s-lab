apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: dev
  labels:
    app: hello
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
      annotations:
        secret-version: "v1"
    spec:
      containers:
        - name: hello
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          env:
            - name: SECRET_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: hello-secret
                  key: MESSAGE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hello-secret
                  key: API_KEY
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: script
              mountPath: /docker-entrypoint.d/90-inject-secrets.sh
              subPath: 90-inject-secrets.sh
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: html
          configMap:
            name: hello-page
        - name: script
          configMap:
            name: hello-script